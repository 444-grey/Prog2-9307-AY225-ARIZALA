<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2b2b2b;
            color: #fff;
        }

        .login-box {
            width: 350px;
            padding: 30px 30px;
            border-radius: 10px;
            background: rgb(38, 35, 216);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .login-box h3 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            color: #fff;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        input[type="text"], input[type="password"] {
            background: #ffffff;
            color: #000;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: rgb(4, 2, 87);
            color: #ffffff;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: rgb(171, 189, 206);
            transform: translateY(-2px);
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h3>Login System</h3>

    <form id="loginForm">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
